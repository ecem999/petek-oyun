<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petek Oyunu - Oyun Müsabakası</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">
    <div class="game-container">
        
        <!-- Üst Bölüm (Skor Tablosu) -->
        <div class="scoreboard-row">
            <!-- Sol: Oyuncu Bilgisi -->
            <div class="player-info" id="playerInfoBox">
                <div class="avatar-circle" id="playerAvatar">👨</div>
                <div class="player-details">
                    <div class="player-name" id="playerName">Oyuncu</div>
                    <div class="player-score">Puan: <span id="playerScore">0</span></div>
                </div>
            </div>

            <!-- Ortada Kronometre (Büyük Petek) -->
            <div class="timer-wrapper">
                <div class="timer-hex">
                    <span id="countdown">15</span>
                </div>
            </div>

            <!-- Sağ: Rakip / Bot Bilgisi -->
            <div class="player-info right-aligned" id="botInfoBox">
                <div class="player-details" style="text-align: right;">
                    <div class="player-name">Robot</div>
                    <div class="player-score">Puan: <span id="botScore">0</span></div>
                </div>
                <div class="avatar-circle bot-avatar" id="botAvatar">🤖</div>
            </div>
        </div>

        <!-- Orta Bölüm (Puan Paneli Petekleri Honeycomb Grid) -->
        <div class="honeycomb-grid">
            <div class="hex-row">
                <div class="hex-point" data-val="50">50</div>
                <div class="hex-point" data-val="100">100</div>
                <div class="hex-point" data-val="150">150</div>
            </div>
            <div class="hex-row">
                <div class="hex-point" data-val="200">200</div>
                <div class="hex-point" data-val="250">250</div>
                <div class="hex-point" data-val="300">300</div>
                <div class="hex-point" data-val="350">350</div>
            </div>
            <div class="hex-row">
                <div class="hex-point" data-val="400">400</div>
                <div class="hex-point" data-val="450">450</div>
                <div class="hex-point" data-val="500">500</div>
            </div>
        </div>

        <!-- Alt Bölüm (Soru Paneli) -->
        <div class="question-panel">
            <div class="q-wrapper">
                <div class="question-hex">
                    <p id="questionText">Puan değerine sahip bir petek seç ve heyecana başla!</p>
                </div>
            </div>
            
            <div class="answers-grid" id="answersGrid" style="opacity: 0.5; pointer-events: none;">
                <button class="ans-btn" data-correct="false" id="ans0">A) Seçenek</button>
                <button class="ans-btn" data-correct="false" id="ans1">B) Seçenek</button>
                <button class="ans-btn" data-correct="false" id="ans2">C) Seçenek</button>
                <button class="ans-btn" data-correct="false" id="ans3">D) Seçenek</button>
            </div>
        </div>

    </div>

    <!-- Sıra Rakipte Animasyonu Overlay -->
    <div class="turn-overlay" id="turnOverlay">
        <h2 id="turnText">Sıra Rakipte!</h2>
    </div>

    <!-- Oyun Sonu Modalı -->
    <div class="modal-overlay" id="endGameModal">
        <div class="modal-content end-game-content">
            <h2 class="modal-title" id="endGameTitle">Tebrikler, Kazandın! 🏆</h2>
            
            <div style="display: flex; justify-content: space-around; margin: 20px 0; align-items: center;">
                <div style="text-align: center;">
                    <div style="font-size: 2.5rem; margin-bottom: 5px;" id="endPlayerAvatar">👨</div>
                    <div style="font-weight: 800; color: var(--text-main);" id="endPlayerName">Oyuncu</div>
                    <div style="font-size: 1.8rem; font-weight: 900; color: #4CAF50;" id="endPlayerScoreVal">0</div>
                </div>
                <div style="font-size: 2.5rem; font-weight: 900; color: var(--text-main);">-</div>
                <div style="text-align: center;">
                    <div style="font-size: 2.5rem; margin-bottom: 5px;">🤖</div>
                    <div style="font-weight: 800; color: var(--text-main);">Robot</div>
                    <div style="font-size: 1.8rem; font-weight: 900; color: #FF4D6D;" id="endBotScoreVal">0</div>
                </div>
            </div>

            <a href="index.html" class="btn" style="width: 100%; text-decoration:none; display:flex;">Ana Sayfaya Dön</a>
        </div>
    </div>

    <!-- JS Yüklemesi -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="sorular.js"></script>
    <script src="oyun.js"></script>
</body>
</html>
