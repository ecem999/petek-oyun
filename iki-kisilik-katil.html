<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oyuna Katıl - Petek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="prep-body">
    <div class="prep-container">
        <div class="back-header">
            <a href="iki-kisilik-secim.html" class="back-btn">⬅ Geri</a>
        </div>

        <div style="text-align: center; margin-bottom: 25px;">
            <h1 style="color: #FF1744; text-shadow: 0px 4px 10px rgba(0,0,0,0.3);">Mevcut Oyuna Katıl</h1>
            <p style="color: white; opacity: 0.8;">Kırmızı Takım / Katılımcı</p>
        </div>

        <div class="card">
            <div class="input-group">
                <label class="input-label" for="joinerNickname">Oyuncu Adın</label>
                <input type="text" id="joinerNickname" class="custom-input" placeholder="Adınızı girin..." autocomplete="off">
            </div>

            <div class="input-group">
                <label class="input-label" for="joinerEmail">E-mail Adresin</label>
                <input type="email" id="joinerEmail" class="custom-input" placeholder="isim@domain.com" autocomplete="off">
            </div>

            <!-- Joiner Avatar -->
            <div class="input-group" style="align-items: center;">
                <label class="input-label" style="align-self: flex-start;">Karakterini Seç</label>
                
                <div class="selected-avatars-display">
                    <div class="selected-avatar-box team-red-border" id="joinerPreviewBox">
                        <img src="" id="joinerPreviewImg" style="display:none;" alt="Oyuncu">
                    </div>
                </div>

                <div class="avatar-galleries" id="joinerAvatarGrid">
                    <div class="gallery-row">
                        <div class="gallery-item avatar-card" data-avatar="k1_beyaz.png"><img src="./k1_beyaz.png"></div>
                        <div class="gallery-item avatar-card" data-avatar="k2_beyaz.png"><img src="./k2_beyaz.png"></div>
                        <div class="gallery-item avatar-card" data-avatar="k3_beyaz.png"><img src="./k3_beyaz.png"></div>
                        <div class="gallery-item avatar-card" data-avatar="k4_beyaz.png"><img src="./k4_beyaz.png"></div>
                    </div>
                    <div class="gallery-row">
                        <div class="gallery-item avatar-card" data-avatar="e1_beyaz.png"><img src="./e1_beyaz.png"></div>
                        <div class="gallery-item avatar-card" data-avatar="e2_beyaz.png"><img src="./e2_beyaz.png"></div>
                        <div class="gallery-item avatar-card" data-avatar="e3_beyaz.png"><img src="./e3_beyaz.png"></div>
                        <div class="gallery-item avatar-card" data-avatar="e4_beyaz.png"><img src="./e4_beyaz.png"></div>
                    </div>
                </div>
            </div>

            <div class="input-group">
                <label class="input-label">Giriş Kodu</label>
                <input type="text" id="joinCode" class="custom-input" placeholder="Örn: 48A2" style="text-transform: uppercase; text-align: center; font-size: 1.5rem; letter-spacing: 5px;">
            </div>

            <button class="btn" id="joinRoomBtn" style="width: 100%; opacity: 0.5; pointer-events: none; background: linear-gradient(135deg, #FF1744, #D50000);">Odaya Giriş Yap</button>
            <p id="joinStatusText" style="text-align: center; color: white; display: none; margin-top: 15px; font-weight: bold;">Başarıyla katıldın! Kurucunun başlatması bekleniyor...</p>
        </div>
    </div>

    <script src="iki-kisilik-katil.js"></script>
</body>
</html>
