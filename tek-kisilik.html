<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tek Kişi Oyna - Hazırlık</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="back-header">
        <a href="index.html" class="back-btn">⬅ Geri</a>
    </div>

    <div class="card">
        <h2>Bot Modu</h2>
        
        <div class="input-group">
            <label class="input-label" for="nickname">Oyuncu Adın</label>
            <input type="text" id="nickname" class="custom-input" placeholder="nickname girin..." autocomplete="off">
        </div>

        <div class="input-group">
            <label class="input-label" for="email">E-mail Adresin</label>
            <input type="email" id="email" class="custom-input" placeholder="isim@domain.com" autocomplete="off">
        </div>

        <!-- Avatar Seçimi -->
        <div class="input-group" style="align-items: center;">
            <label class="input-label" style="align-self: flex-start;">Karakterini Seç</label>
            
            <div class="selected-avatars-display">
                <div class="selected-avatar-box team-blue-border" id="playerPreviewBox">
                    <img src="" id="selected-avatar-preview" style="display:none;" alt="Oyuncu">
                </div>
                <div class="selected-avatar-box team-red-border" id="botPreviewBox" style="opacity: 0.8;">
                    <img src="robot-avatar.png" alt="Robot Rakip">
                </div>
            </div>

            <div class="avatar-galleries" id="avatarGrid">
                <!-- Kadın Avatarlar -->
                <div class="gallery-row">
                    <div class="gallery-item avatar-card" data-avatar="k1_beyaz.png"><img src="./k1_beyaz.png"></div>
                    <div class="gallery-item avatar-card" data-avatar="k2_beyaz.png"><img src="./k2_beyaz.png"></div>
                    <div class="gallery-item avatar-card" data-avatar="k3_beyaz.png"><img src="./k3_beyaz.png"></div>
                    <div class="gallery-item avatar-card" data-avatar="k4_beyaz.png"><img src="./k4_beyaz.png"></div>
                </div>
                <!-- Erkek Avatarlar -->
                <div class="gallery-row">
                    <div class="gallery-item avatar-card" data-avatar="e1_beyaz.png"><img src="./e1_beyaz.png"></div>
                    <div class="gallery-item avatar-card" data-avatar="e2_beyaz.png"><img src="./e2_beyaz.png"></div>
                    <div class="gallery-item avatar-card" data-avatar="e3_beyaz.png"><img src="./e3_beyaz.png"></div>
                    <div class="gallery-item avatar-card" data-avatar="e4_beyaz.png"><img src="./e4_beyaz.png"></div>
                </div>
            </div>
        </div>


        <button class="btn" id="startGameBtn" disabled>Oyuna Başla</button>
    </div>

    <script src="tek-kisilik.js"></script>
</body>
</html>
