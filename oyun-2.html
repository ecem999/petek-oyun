<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Petek - İki Kişilik Müsabaka</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="game-body">
    <!-- Üst Köşe Geri Butonu -->
    <a href="index.html" class="back-btn game-back-btn" onclick="confirmExit(event)">⬅ Geri</a>

    <!-- Özel Çıkış Uyarı Modalı -->
    <div id="exitModal" class="custom-modal-overlay">
        <div class="custom-modal-content">
            <p>Oyundan çıkmak istediğine emin misin? <br><span>Mevcut ilerlemen kaybolacaktır.</span></p>
            <div class="modal-buttons">
                <button id="confirmExitBtn" class="m-btn m-btn-red">Evet, Çık</button>
                <button id="cancelExitBtn" class="m-btn m-btn-blue">Hayır, Devam Et</button>
            </div>
        </div>
    </div>

    <div class="game-container" style="position: relative;"> <!-- block relative -->

        <!-- Sıra Blockeri (Rakip Bekleniyor) -->
        <div id="boardBlocker" style="display: none;">
            <div id="waitOverlayText">Rakibin Hamlesi Bekleniyor... ⏳</div>
        </div>
        
        <!-- Üst Bölüm (Skor Tablosu - Yeni Tasarım) -->
        <div class="scoreboard-row" style="z-index: 9001;">
            <!-- Sol: Host Profili -->
            <div class="player-profile" id="p1InfoBox">
                <div class="avatar-box team-blue-border team-blue-glow" id="p1Avatar">
                    <img src="k1_beyaz.png" alt="Kurucu">
                </div>
                <div class="name-tag" id="p1Name">Kurucu</div>
            </div>

            <!-- Sol Skor -->
            <div class="score-box">
                <div class="score-hex blue-text" id="p1Score">0</div>
            </div>

            <!-- Ortada Kronometre -->
            <div class="timer-wrapper">
                <div class="timer-hex">
                    <span id="countdown">15</span>
                </div>
            </div>

            <!-- Sağ Skor -->
            <div class="score-box">
                <div class="score-hex red-text" id="p2Score">0</div>
            </div>

            <!-- Sağ: Joiner Profili -->
            <div class="player-profile" id="p2InfoBox">
                <div class="avatar-box team-red-border team-red-glow" id="p2Avatar">
                    <img src="e1_beyaz.png" alt="Katılımcı">
                </div>
                <div class="name-tag" id="p2Name">Katılımcı</div>
            </div>
        </div>

        <!-- Orta Bölüm (Puan Paneli Petekleri Honeycomb Grid) -->
        <div class="honeycomb-grid" id="hexGridContainer">
            <div class="hex-point hexagon" data-val="50"><span>50</span></div>
            <div class="hex-point hexagon" data-val="100"><span>100</span></div>
            <div class="hex-point hexagon" data-val="150"><span>150</span></div>
            <div class="hex-point hexagon" data-val="200"><span>200</span></div>
            <div class="hex-point hexagon" data-val="250"><span>250</span></div>
            <div class="hex-point hexagon" data-val="300"><span>300</span></div>
            <div class="hex-point hexagon" data-val="350"><span>350</span></div>
            <div class="hex-point hexagon" data-val="400"><span>400</span></div>
            <div class="hex-point hexagon" data-val="450"><span>450</span></div>
            <div class="hex-point hexagon" data-val="500"><span>500</span></div>
        </div>

        <!-- Alt Bölüm (Soru Paneli) -->
        <div class="question-panel" id="questionPanelContainer">
            <div class="q-wrapper">
                <div class="question-hex">
                    <p id="questionText">Puan değerine sahip bir petek seç ve heyecana başla!</p>
                </div>
            </div>
            
            <div class="answers-grid" id="answersGrid" style="opacity: 0.5;">
                <button class="ans-btn" data-correct="false" id="ans0">A) Seçenek</button>
                <button class="ans-btn" data-correct="false" id="ans1">B) Seçenek</button>
                <button class="ans-btn" data-correct="false" id="ans2">C) Seçenek</button>
                <button class="ans-btn" data-correct="false" id="ans3">D) Seçenek</button>
            </div>
        </div>

    </div>

    <!-- Sıra Rakipte Animasyonu Overlay -->
    <div class="turn-overlay" id="turnOverlay" style="z-index: 10001;">
        <h2 id="turnText">Sıra Rakipte!</h2>
    </div>

    <!-- Oyun Sonu Modalı -->
    <div class="modal-overlay" id="endGameModal" style="z-index: 10005;">
        <div class="modal-content end-game-content">
            <h2 class="modal-title" id="endGameTitle">Oyun Bitti! 🏆</h2>
            
            <div style="display: flex; justify-content: space-around; margin: 20px 0; align-items: center;">
                <div style="text-align: center;">
                    <div style="font-size: 2.5rem; margin-bottom: 5px;" id="endP1Avatar">👨</div>
                    <div style="font-weight: 800; color: var(--text-main);" id="endP1Name">Kurucu</div>
                    <div style="font-size: 1.8rem; font-weight: 900; color: #4CAF50;" id="endP1ScoreVal">0</div>
                </div>
                <div style="font-size: 2.5rem; font-weight: 900; color: var(--text-main);">-</div>
                <div style="text-align: center;">
                    <div style="font-size: 2.5rem; margin-bottom: 5px;" id="endP2Avatar">👩</div>
                    <div style="font-weight: 800; color: var(--text-main);" id="endP2Name">Katılımcı</div>
                    <div style="font-size: 1.8rem; font-weight: 900; color: #03A9F4;" id="endP2ScoreVal">0</div>
                </div>
            </div>

            <button id="returnHomeBtn" class="btn" style="width: 100%;">Ana Sayfaya Dön</button>
        </div>
    </div>

    <!-- JS Yüklemesi -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="sorular.js"></script>
    <script src="oyun-2.js"></script>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="firebase-config.js"></script>
</body>
</html>
